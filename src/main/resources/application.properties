spring.application.name=dge-api-rvcc
server.servlet.context-path=/api
server.port=8081
api.version=1.0
spring.datasource.url=jdbc:postgresql://localhost:5432/bd_dge_rvcc
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver
#spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.default_schema=public
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.show-sql=true

### FLYWAY CONFIGURATIONS
spring.flyway.enabled=false
spring.flyway.baseline-on-migrate=true
spring.flyway.location=classpath:db/migration
spring.flyway.schemas=public
spring.flyway.databaseType=postgresql

springdoc.api-docs.path=/v3/api-docs
## swagger-ui custom path (default: /swagger-ui/index.html)
springdoc.swagger-ui.path=/swagger-ui.html

